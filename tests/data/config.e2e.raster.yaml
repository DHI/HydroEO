project:
  main_dir: "/tmp/hydroeo-e2e-raster"

gis:
  global_crs: "EPSG:4326"

swot_raster:
  enabled: true
  aoi:
    name: "example_aoi"
    type: "bbox"
    bbox: [23.5, 56.5, 24.5, 57.5]
  product: "SWOT_L2_HR_Raster_D"
  startdate: [2024, 1, 1]
  enddate: [2024, 1, 10]
  granule_filter: "*100m*"
  variables: [wse, wse_uncert, wse_qual]
