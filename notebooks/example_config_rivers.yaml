project :
  main_dir : "C:\\Users\\username\\altimetry_project" # main directory in which to store processed outputs

gis :
  global_crs : 'EPSG:4326'

# Rivers branch (exclusive with reservoirs)
rivers :
  # Provide exactly one input source: aoi_path, node_numbers, or reach_numbers.

  # Option A: define an AOI file and subset the SWORD database for one continent.
  aoi_path : "C:\\Users\\username\\altimetry_project\\river_aoi.gpkg" # accepted extensions: .shp or .gpkg
  continent_key : 'eu' # one of: af, as, eu, na, oc, sa
  feature_type : 'reaches' # one of: nodes, reaches
  id_key : 'river_id' # AOI column used to name outputs under swot/rivers/<id_key>/timeseries.csv
  buffer_meters : 1000.0 # optional AOI buffer applied before SWORD subsetting; use null or 0 for no buffer

  # Option B: explicit node numbers. When no AOI file is provided, rivers.id is required for output naming.
  # node_numbers : [10001, 10002, 10003]
  # id : 'gauja'

  # Option C: explicit reach numbers. When no AOI file is provided, rivers.id is required for output naming.
  # reach_numbers : [20001, 20002, 20003]
  # id : 'gauja'

swot:
  download : True
  process : False # river SWOT support currently stops at download() CSV generation
  download_dir : "C:\\Users\\username\\altimetry_project\\data\\swot" # outputs are written under swot/rivers/<river_id>/<node_or_reach_id>/timeseries.csv
  startdate : [2024, 1, 1]
  enddate   : [2024, 11, 1]
  pld_match_max_distance_m : 100.0
  exclude_obs_id_values : ["no_data"]
  hydrocron_fields :
    nodes : ["node_id", "node_q", "reach_id", "time_str", "wse", "wse_u", "p_wse", "geoid_hght", "sword_version", "solid_tide", "load_tidef", "pole_tide", "width", "width_u", "p_width", "xovr_cal_q", "rdr_sig0", "xovr_cal_c", "dark_frac"]
    reaches : ["reach_id", "reach_q", "time_str", "wse", "wse_u", "slope", "slope_u", "slope2", "slope2_u", "width", "width_u", "geoid_hght", "solid_tide", "load_tidef", "pole_tide", "p_wse", "p_width"]
  quality_filters :
    nodes :
      max_q : 2
    reaches :
      max_q : 2
  processing_filters : ["elevation", "MAD"]
  elevation_min_m : 0.0
  elevation_max_m : 8000.0
  mad_threshold : 5.0
